s3:
  bucket: "synth-staging"
  endpoint_url: "https://s3.example.com"
  region_name: "us-east-1"
  use_ssl: true
  ssl_cert: ""

target_storage:
  hive:
    database_name: "synth_"
  iceberg:
    database_name: "datagen_iceberg"

airflow:
  defaults:
    dag_id: "datagen_pipeline"
    dag_run_id_prefix: "datagen"
    poll_interval_seconds: 10
    max_retries: 3
    retry_backoff_base: 2
  environments:
    dev:
      base_url: "https://airflow.dev.example.com"
      poll_interval_seconds: 30
    test:
      base_url: "https://airflow.test.example.com"
    prod:
      base_url: "https://airflow.prod.example.com"
      max_retries: 5
